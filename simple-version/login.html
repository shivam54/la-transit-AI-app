<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - LA Transit App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated background particles */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="20" cy="20" r="2" fill="rgba(255,255,255,0.1)"/><circle cx="80" cy="40" r="1.5" fill="rgba(255,255,255,0.1)"/><circle cx="40" cy="80" r="1" fill="rgba(255,255,255,0.1)"/><circle cx="90" cy="90" r="2.5" fill="rgba(255,255,255,0.1)"/><circle cx="10" cy="60" r="1.5" fill="rgba(255,255,255,0.1)"/></svg>') repeat;
            animation: float 20s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }

        .login-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            box-shadow: 
                0 25px 80px rgba(0, 0, 0, 0.15),
                0 0 0 1px rgba(255, 255, 255, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
            overflow: hidden;
            width: 90%;
            max-width: 1000px;
            max-height: 90vh;
            display: flex;
            animation: slideIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            z-index: 1;
        }

        .login-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, transparent 30%, rgba(255, 255, 255, 0.1) 50%, transparent 70%);
            animation: shimmer 3s ease-in-out infinite;
            z-index: -1;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        @keyframes slideIn {
            from {
                transform: translateX(-100%);
            }
            to {
                transform: translateX(0);
            }
        }

        .left-panel {
            flex: 1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            padding: 3rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .left-panel::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.2) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255, 255, 255, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 40% 60%, rgba(255, 255, 255, 0.1) 0%, transparent 50%);
            animation: pulse 3s ease-in-out infinite alternate;
        }

        .left-panel::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="grid" width="10" height="10" patternUnits="userSpaceOnUse"><path d="M 10 0 L 0 0 0 10" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/></pattern></defs><rect width="100" height="100" fill="url(%23grid)"/></svg>');
            opacity: 0.3;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(10px, 10px); }
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .right-panel {
            flex: 1;
            padding: 3rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: white;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
            z-index: 5;
            position: relative;
        }

        .logo-icon {
            width: 3rem;
            height: 3rem;
            background: linear-gradient(135deg, #fff 0%, #f0f0f0 100%);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: #667eea;
            box-shadow: 
                0 8px 25px rgba(0, 0, 0, 0.15),
                inset 0 1px 0 rgba(255, 255, 255, 0.8);
            animation: logoFloat 3s ease-in-out infinite;
            position: relative;
        }

        .logo-icon::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #667eea, #764ba2, #f093fb, #667eea);
            border-radius: 17px;
            z-index: -1;
            animation: logoGlow 2s ease-in-out infinite alternate;
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-5px) rotate(2deg); }
        }

        @keyframes logoGlow {
            0% { opacity: 0.5; }
            100% { opacity: 0.8; }
        }

        .logo-text {
            font-size: 2.5rem;
            font-weight: bold;
            margin: 0;
            background: linear-gradient(45deg, #fff, #f0f0f0, #fff);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: textShine 3s ease-in-out infinite;
        }

        @keyframes textShine {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .welcome-text {
            font-size: 1.8rem;
            margin-bottom: 1rem;
            text-align: center;
            z-index: 5;
            position: relative;
        }

        .features-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            z-index: 5;
            position: relative;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.5rem 0;
            transition: all 0.3s ease;
            border-radius: 10px;
            padding: 0.75rem;
            margin: 0.25rem 0;
        }

        .feature-item:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(10px);
        }

        .feature-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.3), rgba(255, 255, 255, 0.1));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        .feature-item:hover .feature-icon {
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
        }

        .login-title {
            font-size: 2rem;
            background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            text-align: center;
            font-weight: 700;
            animation: titleGlow 2s ease-in-out infinite alternate;
        }

        @keyframes titleGlow {
            0% { filter: drop-shadow(0 0 5px rgba(102, 126, 234, 0.3)); }
            100% { filter: drop-shadow(0 0 15px rgba(118, 75, 162, 0.5)); }
        }

        .login-subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }

        .login-options {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .login-button {
            border: none;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .google-login {
            background: linear-gradient(135deg, #4285f4 0%, #34a853 100%);
            color: white;
            box-shadow: 
                0 8px 25px rgba(66, 133, 244, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
        }

        .google-login::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .google-login:hover::before {
            left: 100%;
        }

        .google-login:hover {
            background: linear-gradient(135deg, #3367d6 0%, #2d8f47 100%);
            transform: translateY(-3px) scale(1.02);
            box-shadow: 
                0 12px 35px rgba(66, 133, 244, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }

        .guest-login {
            background: transparent;
            color: #667eea;
            border: 2px solid transparent;
            background-image: linear-gradient(white, white), linear-gradient(135deg, #667eea, #764ba2, #f093fb);
            background-origin: border-box;
            background-clip: content-box, border-box;
            position: relative;
            overflow: hidden;
        }

        .guest-login::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: -1;
        }

        .guest-login:hover::before {
            opacity: 1;
        }

        .guest-login:hover {
            color: white;
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 35px rgba(102, 126, 234, 0.3);
        }


        .google-icon {
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #4285f4;
            font-size: 14px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            animation: iconPulse 2s ease-in-out infinite;
        }

        @keyframes iconPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .loading-spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        .back-button {
            position: absolute;
            top: 1rem;
            left: 1rem;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 10;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1) rotate(-5deg);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
        }

        /* Floating elements */
        .floating-element {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            animation: floatUp 6s ease-in-out infinite;
        }

        .floating-element:nth-child(1) {
            width: 20px;
            height: 20px;
            top: 20%;
            left: 10%;
            animation-delay: 0s;
        }

        .floating-element:nth-child(2) {
            width: 15px;
            height: 15px;
            top: 60%;
            right: 15%;
            animation-delay: 2s;
        }

        .floating-element:nth-child(3) {
            width: 25px;
            height: 25px;
            bottom: 30%;
            left: 20%;
            animation-delay: 4s;
        }

        @keyframes floatUp {
            0%, 100% {
                transform: translateY(0px) rotate(0deg);
                opacity: 0.7;
            }
            50% {
                transform: translateY(-20px) rotate(180deg);
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .login-container {
                flex-direction: column;
                width: 95%;
                max-height: 95vh;
            }
            
            .left-panel {
                padding: 2rem;
            }
            
            .right-panel {
                padding: 2rem;
            }
            
            .logo-text {
                font-size: 2rem;
            }
            
            .welcome-text {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- Floating background elements -->
    <div class="floating-element"></div>
    <div class="floating-element"></div>
    <div class="floating-element"></div>
    
    <div class="login-container">
        <div class="left-panel">
            <a href="index-working-with-location-sharing.html" class="back-button">
                ←
            </a>
            
            <div class="logo">
                <div class="logo-icon">🚇</div>
                <h1 class="logo-text">LA Transit</h1>
            </div>
            
            <h2 class="welcome-text">Welcome to LA Transit</h2>
            
            <div class="features-list">
                <div class="feature-item">
                    <div class="feature-icon">📍</div>
                    <span>Real-time route planning</span>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">⏰</div>
                    <span>Live transit updates</span>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">👤</div>
                    <span>Personalized recommendations</span>
                </div>
            </div>
        </div>
        
        <div class="right-panel">
            <h2 class="login-title">Get Started</h2>
            <p class="login-subtitle">
                Sign in to access the LA Transit app and get personalized route planning
            </p>
            
            <div class="login-options">
                <button class="login-button google-login" onclick="loginWithGoogle()">
                    <div class="google-icon">G</div>
                    Continue with Google
                </button>
                
                <button class="login-button guest-login" onclick="loginAsGuest()">
                    👤 Continue as Guest
                </button>
            </div>
        </div>
    </div>

    <script>
        // Authentication management
        class AuthManager {
            constructor() {
                this.currentUser = this.getStoredUser();
            }

            getStoredUser() {
                const user = localStorage.getItem('la-transit-user');
                return user ? JSON.parse(user) : null;
            }

            storeUser(user) {
                localStorage.setItem('la-transit-user', JSON.stringify(user));
                this.currentUser = user;
            }

            clearUser() {
                localStorage.removeItem('la-transit-user');
                this.currentUser = null;
            }

            isAuthenticated() {
                return this.currentUser !== null;
            }
        }

        const authManager = new AuthManager();

        function loginWithGoogle() {
            const button = event.target;
            const originalText = button.innerHTML;
            
            // Show loading state
            button.innerHTML = '<div class="loading-spinner"></div>';
            button.disabled = true;

            // Simulate Google OAuth (in real app, integrate with Google OAuth API)
            setTimeout(() => {
                const mockGoogleUser = {
                    id: 'google_' + Date.now(),
                    name: 'John Doe',
                    email: 'john.doe@gmail.com',
                    picture: 'https://via.placeholder.com/150/4285f4/ffffff?text=JD',
                    provider: 'google',
                    loginTime: new Date().toISOString()
                };

                authManager.storeUser(mockGoogleUser);
                redirectToApp();
            }, 1500);
        }

        function loginAsGuest() {
            const button = event.target;
            const originalText = button.innerHTML;
            
            // Show loading state
            button.innerHTML = '<div class="loading-spinner"></div>';
            button.disabled = true;

            setTimeout(() => {
                const guestUser = {
                    id: 'guest_' + Date.now(),
                    name: 'Guest User',
                    email: 'guest@example.com',
                    provider: 'guest',
                    loginTime: new Date().toISOString()
                };

                authManager.storeUser(guestUser);
                redirectToApp();
            }, 1000);
        }

        function redirectToApp() {
            // Redirect to main app
            window.location.href = '/app';
        }

        // Check if user is already logged in
        if (authManager.isAuthenticated()) {
            // User is already logged in, redirect to app
            redirectToApp();
        }
    </script>
</body>
</html>
